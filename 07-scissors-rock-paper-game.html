<!DOCTYPE html>
<html>

<head>
    <title>scissors , Rock and Paper</title>
</head>

<body>
    
    <h2>scissors , Rock and Paper</h2>
    <br/>
    <button onclick="

        let result = '';

        const computerMove = game();

        let resultGame = compare(computerMove, 'rock');

        alert(`computer choose ${computerMove} and you ${resultGame}`);

    ">Rock</button>

    <button onclick="
        resultGame = compare(computerMove, 'paper');

        alert(`computer choose ${computerMove} and you ${resultGame}`);


    ">Paper</button>

    <button onclick="

        resultGame = compare(computerMove, 'scissors');

        alert(`computer choose ${computerMove} and you ${resultGame}`);

    ">Scissors</button>


    <script>

        function game(){    
            const randomNumber=Math.random();

            if(randomNumber >=0 && randomNumber <1/3){
                
                computerMove = 'rock';

            } else if (randomNumber >=1/3 && randomNumber <2/3){
                
                computerMove  ='paper';
            } else {
                
                computerMove='scissors';
            }    
            
            return computerMove;
        }

        game();
        
        function compare(computerMove, user){
            let result = '';
            if( computerMove === user){
                result = 'Tie';
            } else if (computerMove === 'rock' && user === 'paper' ) {
                result = 'win';
            } else if (computerMove === 'rock' && user === 'scissors'){
                result = 'lose';
            } else if (computerMove === 'scissors' && user === 'paper'){
                result = 'lose';
            }else if (computerMove === 'scissors' && user === 'rock'){
                result = 'win';
            }else if (computerMove === 'paper' && user === 'rock'){
                result = 'lose';
            }else if (computerMove === 'paper' && user === 'scissors'){
                result = 'win';
            }

            
        return result;

        }

    </script>
</body>
