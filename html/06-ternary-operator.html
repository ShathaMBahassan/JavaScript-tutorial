<!DOCTYPE html>
<html>

<head>
    <title>If statement</title>
</head>

<body>
    
    <h2>Ternary operator</h2>




    <script>
    let age = 20;

     // ternary operator: condition ? expressionIfTrue : expressionIfFalse;

     let result = age >=18 ? 'you can drive' : 'you can not drive'

     console.log(result);


     // guard operator &&: expression1 && expression2

     age=17 && 'you can not drive';
     console.log(age);

     // default operator || : assign a default value to a variable. It returns the first "truthy" value it finds
     
     const currency = 'EUR' || 'USD';
     console.log(currency);

     const currency2 = undefined || 'USD';
     console.log(currency2);
     

    </script>
</body>

</html>
