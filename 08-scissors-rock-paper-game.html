<!DOCTYPE html>
<html>

<head>
    <title>scissors , Rock and Paper</title>
</head>

<body>
    
    <h2>scissors , Rock and Paper</h2>
    <br/>
    <button onclick=" let resultGame = compare(computerMove, 'rock',score);">Rock</button>

    <button onclick=" resultGame = compare(computerMove, 'paper',score);">Paper</button>

    <button onclick="resultGame = compare(computerMove, 'scissors',score);">Scissors</button>

    <button onclick="
        score.lose=0;
        score.win=0;
        score.tie=0;
        
        localStorage.removeItem(score);
        
        alert(`Tie: ${score.tie} , Win: ${score.win} , Lose: ${score.lose}`);
    ">Reset Score</button>


    <script>
        const computerMove = game();
        let result = '';
        let score =  JSON.pares(localStorage.getItem('score'));

        if(score === null){
            score = {
                win : 0,
                lose: 0,
                tie:0
            };
        }

        function game(){    
            const randomNumber=Math.random();

            if(randomNumber >=0 && randomNumber <1/3){
                
                computerMove = 'rock';

            } else if (randomNumber >=1/3 && randomNumber <2/3){
                
                computerMove  ='paper';
            } else {
                
                computerMove='scissors';
            }    
            
            return computerMove;
        }

        game();
        
        function compare(computerMove, user , score){
            let result = '';
            if( computerMove === user){
                result = 'Tie';
                score.tie ++;
            } else if (computerMove === 'rock' && user === 'paper' ) {
                result = 'win';
                score.win ++;
            } else if (computerMove === 'rock' && user === 'scissors'){
                result = 'lose';
                score.lose ++;
            } else if (computerMove === 'scissors' && user === 'paper'){
                result = 'lose';
                score.lose ++;
            }else if (computerMove === 'scissors' && user === 'rock'){
                result = 'win';
                score.win ++;
            }else if (computerMove === 'paper' && user === 'rock'){
                result = 'lose';
                score.lose ++;
            }else if (computerMove === 'paper' && user === 'scissors'){
                result = 'win';
                score.win ++;
            }     
        return result;
        }

        localStorage.setItem('score',JSON.stringify(score))

        alert(`computer choose ${computerMove} and you ${resultGame}\n 
        Tie: ${score.tie} , Win: ${score.win} , Lose: ${score.lose}`);


    </script>
</body>

</html>
